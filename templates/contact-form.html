<!DOCTYPE html PUBLIC "-//W3C//DTD HTML 4.01 Transitional//EN" "http://www.w3.org/TR/html4/loose.dtd">
<html>
  <head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <title>New Contact Message</title>
    <style type="text/css">
      /* RESET */
      body,
      table,
      td,
      a {
        -webkit-text-size-adjust: 100%;
        -ms-text-size-adjust: 100%;
      }
      table,
      td {
        mso-table-lspace: 0pt;
        mso-table-rspace: 0pt;
      }
      img {
        -ms-interpolation-mode: bicubic;
      }

      /* GENERAL */
      body {
        font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
        background-color: #f8f9fa;
        margin: 0;
        padding: 0;
        width: 100% !important;
        color: #1a1a1a;
      }
      .container {
        width: 100%;
        max-width: 600px;
        margin: 0 auto;
        background-color: #ffffff;
      }

      /* HEADER */
      .header-area {
        background-color: #ffffff;
        padding: 40px 0 30px;
        text-align: center;
        border-bottom: 1px solid #f0f0f0;
      }
      .logo-main {
        font-family: "Georgia", "Times New Roman", serif;
        font-size: 24px;
        color: #941b1b;
        text-transform: uppercase;
        letter-spacing: 0.2em;
        font-weight: bold;
        line-height: 1.2;
      }
      .logo-sub {
        font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
        font-size: 10px;
        color: #999999;
        text-transform: uppercase;
        letter-spacing: 0.4em;
        font-weight: bold;
        margin-top: 5px;
      }

      /* HERO */
      .hero-section {
        padding: 60px 40px 40px;
        text-align: center;
        background-color: #ffffff;
      }
      .status-pill {
        display: inline-block;
        background-color: #e2e8f0; /* Grey Background */
        color: #475569; /* Slate Text */
        font-size: 10px;
        font-weight: bold;
        text-transform: uppercase;
        letter-spacing: 0.2em;
        padding: 8px 16px;
        border-radius: 50px;
        margin-bottom: 25px;
      }
      .hero-heading {
        font-family: "Georgia", "Times New Roman", serif;
        font-size: 32px;
        color: #1a1a1a;
        text-transform: uppercase;
        font-weight: normal;
        letter-spacing: 0.1em;
        margin-bottom: 20px;
        line-height: 1.3;
      }
      .hero-text {
        color: #666666;
        font-size: 14px;
        line-height: 1.8;
        max-width: 400px;
        margin: 0 auto;
      }

      /* DETAILS GRID */
      .details-section {
        padding: 20px 40px 40px;
        background-color: #ffffff;
      }
      .detail-row {
        border-bottom: 1px solid #f0f0f0;
        padding: 20px 0;
      }
      .detail-label {
        font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
        font-size: 10px;
        text-transform: uppercase;
        color: #941b1b; /* Primary Red */
        letter-spacing: 0.15em;
        font-weight: bold;
        margin-bottom: 8px;
        display: block;
      }
      .detail-value {
        font-family: "Georgia", "Times New Roman", serif;
        font-size: 18px;
        color: #1a1a1a;
        letter-spacing: 0.05em;
        display: block;
      }

      /* MESSAGE BOX */
      .message-box {
        background-color: #f8f9fa;
        padding: 30px;
        margin-top: 30px;
        text-align: left;
        border-left: 2px solid #941b1b;
      }
      .message-content {
        font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
        font-size: 14px;
        line-height: 1.6;
        color: #333333;
      }

      /* FOOTER */
      .footer-area {
        background-color: #1a1a1a;
        color: #ffffff;
        padding: 50px 20px;
        text-align: center;
      }
      .footer-copy {
        color: #666666;
        font-size: 10px;
        margin-top: 10px;
        line-height: 1.8;
        letter-spacing: 0.1em;
      }
    </style>
  </head>
  <body>
    <div style="background-color: #f8f9fa; width: 100%">
      <table
        border="0"
        cellspacing="0"
        cellpadding="0"
        align="center"
        class="container"
      >
        <!-- HEADER -->
        <tr>
          <td class="header-area">
            <div class="logo-main">Amethyst Suites</div>
            <div class="logo-sub">& Residences</div>
          </td>
        </tr>

        <!-- HERO -->
        <tr>
          <td class="hero-section">
            <span class="status-pill">New Inquiry</span>
            <div class="hero-heading">Message<br />Received</div>
            <div class="hero-text">
              A new message has been submitted via the contact form. Please
              review the details below.
            </div>
          </td>
        </tr>

        <!-- DETAILS -->
        <tr>
          <td class="details-section">
            <div class="detail-row">
              <span class="detail-label">Sender Name</span>
              <span class="detail-value">{{name}}</span>
            </div>

            <div class="detail-row">
              <span class="detail-label">Reply Email</span>
              <span class="detail-value">
                <a
                  href="mailto:{{email}}"
                  style="color: #1a1a1a; text-decoration: none"
                  >{{email}}</a
                >
              </span>
            </div>

            <div class="detail-row">
              <span class="detail-label">Subject</span>
              <span class="detail-value">{{subject}}</span>
            </div>

            <!-- MESSAGE CONTENT -->
            <div class="message-box">
              <span class="detail-label" style="margin-bottom: 15px"
                >Message Content</span
              >
              <div class="message-content">{{message}}</div>
            </div>
          </td>
        </tr>

        <!-- FOOTER -->
        <tr>
          <td class="footer-area">
            <div class="footer-copy">
              System Notification<br />
              Amethyst Suites & Dining Admin Panel
            </div>
          </td>
        </tr>
      </table>
    </div>
  </body>
</html>
